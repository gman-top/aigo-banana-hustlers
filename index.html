<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banana Hustlers - AIGO v0.2</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
    <!-- Load PixiJS & GSAP -->
    <script src="https://pixijs.download/v8.1.0/pixi.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/PixiPlugin.min.js"></script>
</head>
<body>

<script type="module">
    // --- CONFIG ---
    const ASSETS = {
        bg: './assets/background.png',
        logo: './assets/ui_freespins.png',
        sym1: './assets/symbol_surf.png',
        sym2: './assets/symbol_glasses.png',
        sym3: './assets/symbol_banana.png',
        sym4: './assets/symbol_coconut.png',
        // SVG UI
        btnSpin: './assets/btn_spin.svg',
        uiBalance: './assets/ui_balance.svg',
        uiBet: './assets/ui_bet.svg'
    };

    const REELS = 5;
    const ROWS = 3;
    const SYMBOL_SIZE = 180;
    const REEL_WIDTH = 200;
    
    // Setup PixiJS App
    const app = new PIXI.Application();
    await app.init({ resizeTo: window, background: '#1099bb', antialias: true });
    document.body.appendChild(app.canvas);

    // Register GSAP Plugin
    gsap.registerPlugin(PixiPlugin);
    PixiPlugin.registerPIXI(PIXI);

    // Load Assets
    for (const [key, url] of Object.entries(ASSETS)) {
        PIXI.Assets.add({ alias: key, src: url });
    }
    const textures = await PIXI.Assets.load(Object.keys(ASSETS));

    // --- SCENE SETUP ---
    
    // 1. Background (Cover Mode)
    const bg = new PIXI.Sprite(textures.bg);
    bg.anchor.set(0.5);
    bg.x = app.screen.width / 2;
    bg.y = app.screen.height / 2;
    // Scale BG to cover
    const scaleX = app.screen.width / bg.width;
    const scaleY = app.screen.height / bg.height;
    const scale = Math.max(scaleX, scaleY);
    bg.scale.set(scale);
    app.stage.addChild(bg);

    // 2. Reel Container (Centered)
    const reelContainer = new PIXI.Container();
    reelContainer.x = (app.screen.width - (REEL_WIDTH * REELS)) / 2 + (REEL_WIDTH / 2);
    reelContainer.y = (app.screen.height - (SYMBOL_SIZE * ROWS)) / 2 + (SYMBOL_SIZE / 2);
    
    // Add Drop Shadow Filter to Container (Depth)
    const dropShadow = new PIXI.AlphaFilter(); // Simple trick, real shadow needs filter plugin
    // Actually, let's use a simple trick: Draw shadow under symbols
    
    app.stage.addChild(reelContainer);

    // Create Reels
    const reels = [];
    const symbolTextures = [textures.sym1, textures.sym2, textures.sym3, textures.sym4];

    for (let i = 0; i < REELS; i++) {
        const rc = new PIXI.Container();
        rc.x = i * REEL_WIDTH;
        reelContainer.addChild(rc);

        const reel = {
            container: rc,
            symbols: [],
            position: 0,
            previousPosition: 0,
            blur: new PIXI.BlurFilter()
        };
        
        reel.blur.blurX = 0;
        reel.blur.blurY = 0;
        reel.blur.strength = 0;
        rc.filters = [reel.blur];

        // Fill Reel with Symbols (Active + Buffer)
        for (let j = 0; j < ROWS + 4; j++) { // +4 buffer for longer spin look
            const symbol = new PIXI.Sprite(symbolTextures[Math.floor(Math.random() * symbolTextures.length)]);
            symbol.anchor.set(0.5);
            symbol.scale.set(0.5); 
            symbol.y = j * SYMBOL_SIZE;
            
            // Add slight shadow sprite under symbol? No, keeps it simple for now.
            
            rc.addChild(symbol);
            reel.symbols.push(symbol);
        }
        reels.push(reel);
    }

    // 3. Header Logo
    const logo = new PIXI.Sprite(textures.logo);
    logo.anchor.set(0.5);
    logo.scale.set(0.6);
    logo.x = app.screen.width / 2;
    logo.y = 100;
    
    // Float Animation for Logo
    gsap.to(logo, { y: 110, duration: 2, yoyo: true, repeat: -1, ease: "sine.inOut" });
    
    app.stage.addChild(logo);

    // 4. UI Layer (SVG Buttons)
    const uiContainer = new PIXI.Container();
    uiContainer.y = app.screen.height - 100;
    uiContainer.x = app.screen.width / 2;
    app.stage.addChild(uiContainer);

    // Spin Button (Center)
    const btnSpin = new PIXI.Sprite(textures.btnSpin);
    btnSpin.anchor.set(0.5);
    btnSpin.scale.set(0.8);
    btnSpin.eventMode = 'static'; // Make interactive
    btnSpin.cursor = 'pointer';
    uiContainer.addChild(btnSpin);

    // Hover Effect
    btnSpin.on('pointerover', () => gsap.to(btnSpin.scale, { x: 0.9, y: 0.9, duration: 0.1 }));
    btnSpin.on('pointerout', () => gsap.to(btnSpin.scale, { x: 0.8, y: 0.8, duration: 0.1 }));
    btnSpin.on('pointerdown', () => spin()); // Click!

    // Balance (Left)
    const uiBalance = new PIXI.Sprite(textures.uiBalance);
    uiBalance.anchor.set(0.5);
    uiBalance.scale.set(0.6);
    uiBalance.x = -250;
    uiContainer.addChild(uiBalance);

    // Bet Box (Right)
    const uiBet = new PIXI.Sprite(textures.uiBet);
    uiBet.anchor.set(0.5);
    uiBet.scale.set(0.6);
    uiBet.x = 250;
    uiContainer.addChild(uiBet);


    // --- GAME LOGIC ---

    let running = false;

    // Spin Function
    function spin() {
        if (running) return;
        running = true;

        // Animate Button Press
        gsap.fromTo(btnSpin.scale, { x: 0.7, y: 0.7 }, { x: 0.8, y: 0.8, duration: 0.2, ease: "back.out(2)" });

        reels.forEach((r, i) => {
            const extra = Math.floor(Math.random() * 3);
            const target = r.position + 20 + i * 5 + extra; // More spins
            const time = 2 + i * 0.3; // Staggered stop

            // Animate position with ELASTIC easing
            gsap.to(r, {
                position: target,
                duration: time,
                ease: "back.out(0.6)", // JUICY BOUNCE!
                onUpdate: () => {
                    // Calculate speed for blur
                    const speed = Math.abs(r.position - r.previousPosition);
                    r.blur.blurY = speed * 20; // Stronger blur
                    r.previousPosition = r.position;
                    
                    // Wrap symbols logic
                    for (let j = 0; j < r.symbols.length; j++) {
                        const s = r.symbols[j];
                        const prevY = s.y;
                        s.y = ((r.position + j) % r.symbols.length) * SYMBOL_SIZE - SYMBOL_SIZE;
                        
                        // Swap texture on wrap
                        if (s.y < 0 && prevY > SYMBOL_SIZE) {
                            s.texture = symbolTextures[Math.floor(Math.random() * symbolTextures.length)];
                        }
                    }
                },
                onComplete: () => {
                    r.blur.blurY = 0;
                    // Flash effect on stop? Maybe later.
                    if (i === reels.length - 1) running = false;
                }
            });
        });
    }

    // Ticker
    app.ticker.add(() => {
        // Keep UI centered on resize (simple logic)
        bg.x = app.screen.width / 2;
        bg.y = app.screen.height / 2;
        logo.x = app.screen.width / 2;
        uiContainer.x = app.screen.width / 2;
        uiContainer.y = app.screen.height - 80;
        reelContainer.x = (app.screen.width - (REEL_WIDTH * REELS)) / 2 + (REEL_WIDTH / 2);
        reelContainer.y = (app.screen.height - (SYMBOL_SIZE * ROWS)) / 2 + (SYMBOL_SIZE / 2);
    });

</script>
</body>
</html>
